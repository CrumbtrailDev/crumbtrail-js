[package]
name = "tauri-plugin-crumbtrail"
version = "0.1.0"
edition = "2021"
description = "Tauri v2 plugin for Crumbtrail: capture desktop app sessions over native IPC, no server process required"
license = "MIT"
repository = "https://github.com/CrumbtrailDev/crumbtrail-cli"
homepage = "https://crumbtrail.ai"
keywords = ["tauri", "plugin", "debugging", "session-replay", "observability"]
categories = ["development-tools::debugging", "gui"]
links = "tauri-plugin-crumbtrail"

[lib]
crate-type = ["lib", "cdylib"]

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["fs", "sync"] }

[build-dependencies]
tauri-plugin = { version = "2", features = ["build"] }

[dev-dependencies]
tempfile = "3"
